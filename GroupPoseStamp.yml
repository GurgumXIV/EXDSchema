name: GroupPoseStamp
displayField: Name
fields:
  - name: Name
  - name: UnlockCriteria
    type: link
    condition:
      switch: UnlockType
      cases:
        1: [Quest]
        3: [InstanceContent] # Unlocked
        4: [InstanceContent] # Completed
        5: [Emote]
        6: [Companion]
        7: [Mount]
        8: [Ornament]
  - name: StampIcon
    type: icon
  - name: Unknown1
  - name: Category
    type: link
    targets: [GroupPoseStampCategory]
  - name: Festival
    type: link
    targets: [Festival]
  - name: SortKey
  - name: UnlockType
    comment: |
      1 = Quest
      2 = UnlockLink
      3 = InstanceContent unlocked
      4 = InstanceContent completed
      5 = Emote unlocked
      6 = Companion unlocked
      7 = Mount unlocked
      8 = Ornament unlocked
      9 = FramersKit unlocked
      10 = Always available
  - name: Unknown5
  - name: Unknown6
  - name: Unknown7
